name: 'release Mina MCP server'
on:
  push:
    branches:
      - main

env:
  GITHUB_TOKEN: ${{ secrets.BOT_ACCESS_TOKEN }}
  HUSKY: 0
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  NPM_CONFIG_PROVENANCE: true
  VITE_GITHUB_CLIENT_ID_MINA: ${{ vars.VITE_GITHUB_CLIENT_ID_MINA }}

jobs:
  release-mina-mcp-server:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
      id-token: write # needed for provenance data generation
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_ACCESS_TOKEN }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org/'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: yarn --frozen-lockfile

      - run: npm config set workspaces-update false

      - name: setup git
        run: |
          git config --global user.email "159919634+keadexbot@users.noreply.github.com"
          git config --global user.name "Keadex Bot"

      - uses: nrwl/nx-set-shas@v4

      - name: release libraries with nx version plans
        run: yarn nx release-keadex-projects --multiplatformMode
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
